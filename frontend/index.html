<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>paper-contracts | by devthomas</title>
    <link rel="icon" type="image/png" href="/paper‑contracts.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              premium: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', gold: '#d4af37' },
              neon: { purple: '#a855f7', green: '#10b981', cyan: '#06b6d4' },
            },
            fontFamily: {
              sans: ['Outfit', 'Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
              serif: ['Lora', 'Times New Roman', 'serif'],
            },
            boxShadow: {
              'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.5)',
              'glow': '0 0 20px rgba(99, 102, 241, 0.2)',
            },
            animation: {
              'in-scale': 'inScale .4s cubic-bezier(0.16, 1, 0.3, 1)',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              inScale: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            },
          },
        },
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;600&display=swap');

      body {
        background-color: #020617;
        color: #f8fafc;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      .indent-8 {
        text-indent: 2rem;
      }

      .slide-in-from-top-4 {
        --tw-enter-translate-y: -1rem;
      }
      .fade-in {
        --tw-enter-opacity: 0;
        opacity: 1;
        transition: opacity 0.3s;
      }

      @media print {
        @page {
          size: A4;
          margin: 0;
        }

        body {
          background-color: white !important;
          color: black !important;
          margin: 0;
          padding: 0;
          overflow: visible;
        }

        body * {
          visibility: hidden;
        }

        #printable-content,
        #printable-content * {
          visibility: visible;
        }

        #printable-content {
          position: absolute;
          left: 0;
          top: 0;
          width: 210mm !important;
          min-height: 297mm !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }

      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
